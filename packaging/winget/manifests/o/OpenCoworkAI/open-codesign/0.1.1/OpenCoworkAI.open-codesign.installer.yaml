PackageIdentifier: OpenCoworkAI.open-codesign
PackageVersion: 0.1.1
InstallerType: nullsoft
Scope: user
UpgradeBehavior: install
# electron-builder's NSIS target with `arch: [x64, arm64]` emits a single
# multi-arch installer (no per-arch split). The one file is published as
# "open-codesign.Setup.<version>.exe" — spaces in the productName collapse
# to dots when GitHub Releases re-attaches the asset. Both architectures
# share the same InstallerUrl and InstallerSha256.
Installers:
  - Architecture: x64
    InstallerUrl: https://github.com/OpenCoworkAI/open-codesign/releases/download/v0.1.1/open-codesign.Setup.0.1.1.exe
    InstallerSha256: REPLACE_WITH_WIN_SHA256
  - Architecture: arm64
    InstallerUrl: https://github.com/OpenCoworkAI/open-codesign/releases/download/v0.1.1/open-codesign.Setup.0.1.1.exe
    InstallerSha256: REPLACE_WITH_WIN_SHA256
ManifestType: installer
ManifestVersion: 1.6.0
